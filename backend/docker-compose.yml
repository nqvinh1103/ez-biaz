services:
  postgres:
    image: postgres:16
    container_name: ezbias-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: EzBiasDb
      # DEV ONLY: allow connections without password from host (fixes Docker Desktop network auth issues)
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - ezbias_pgdata:/var/lib/postgresql/data
volumes:
  ezbias_pgdata:
